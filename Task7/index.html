<!DOCTYPE html>
<html>
<head>
    <title>Interactive Feedback Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="form-box">
    <h2>Feedback Form</h2>

    <form id="feedbackForm">
        <label>Username:</label>
        <input type="text" id="name" placeholder="Enter Name" onkeyup="validateName()">
        <div id="nameError" class="error"></div>

         <label>Email:</label>
        <input type="email" id="email" placeholder="Enter Email" onkeyup="validateEmail()">
        <div id="emailError" class="error"></div>

         <label>Feedback:</label>
        <textarea id="message" rows="4" placeholder="Enter Feedback" onkeyup="validateMessage()"></textarea>
        <div id="messageError" class="error"></div>

        <button type="button" ondblclick="submitForm()">Submit</button>

        <div id="result"></div>

    </form>
</div>

<script src="script.js"></script>
</body>
</html>
